# .github/workflows/secrets-and-env.yml
name: Secrets and Environment Variables

on:
  push:
    branches: [main]
  workflow_dispatch:

# Глобальні environment variables для всього workflow
env:
  NODE_ENV: production
  APP_NAME: My Application

jobs:
  # Job 1: Демонстрація environment variables
  env-vars:
    name: Environment Variables Demo
    runs-on: ubuntu-latest

    # Environment variables для конкретного job
    env:
      JOB_SPECIFIC_VAR: "This is job-specific"
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display environment variables
        run: |
          echo "Global env vars:"
          echo "  NODE_ENV: ${{ env.NODE_ENV }}"
          echo "  APP_NAME: ${{ env.APP_NAME }}"
          echo ""
          echo "Job-specific env vars:"
          echo "  JOB_SPECIFIC_VAR: ${{ env.JOB_SPECIFIC_VAR }}"
          echo "  BUILD_NUMBER: ${{ env.BUILD_NUMBER }}"
          echo ""
          echo "GitHub context variables:"
          echo "  Repository: ${{ github.repository }}"
          echo "  Actor: ${{ github.actor }}"
          echo "  SHA: ${{ github.sha }}"
          echo "  Ref: ${{ github.ref }}"

      - name: Use environment variable in script
        env:
          STEP_SPECIFIC_VAR: "This is step-specific"
        run: |
          echo "Step-specific var: $STEP_SPECIFIC_VAR"
          # Змінні доступні як звичайні змінні середовища
          export MY_VAR="test"
          echo "Exported var: $MY_VAR"

  # Job 2: Робота з secrets
  secrets-demo:
    name: Secrets Demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use secrets
        env:
          # Secrets доступні через ${{ secrets.SECRET_NAME }}
          API_KEY: ${{ secrets.API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # Secrets автоматично приховуються в логах
          echo "API Key is set: $([ -n "$API_KEY" ] && echo 'Yes' || echo 'No')"
          echo "Database URL is set: $([ -n "$DATABASE_URL" ] && echo 'Yes' || echo 'No')"
          echo "Deploy token is set: $([ -n "$DEPLOY_TOKEN" ] && echo 'Yes' || echo 'No')"

          # Важливо: не виводити secrets у логи!
          # echo "$API_KEY"  # ❌ НЕ РОБІТЬ ТАК!

      - name: Use secret in command
        run: |
          # Secrets можна використовувати безпосередньо
          curl -H "Authorization: Bearer ${{ secrets.API_KEY }}" \
               https://api.example.com/data || echo "API call failed (expected in demo)"

  # Job 3: Робота з environments
  environments-demo:
    name: Environments Demo
    runs-on: ubuntu-latest
    environment:
      name: staging # Використовує environment "staging"
      url: https://staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display environment info
        run: |
          echo "Environment: ${{ github.environment }}"
          echo "Environment URL: ${{ env.ENVIRONMENT_URL }}"

      - name: Use environment-specific secrets
        env:
          ENV_API_KEY: ${{ secrets.ENV_API_KEY }}
        run: |
          echo "Environment-specific secret is set: $([ -n "$ENV_API_KEY" ] && echo 'Yes' || echo 'No')"

  # Job 4: Умовне використання secrets
  conditional-secrets:
    name: Conditional Secrets
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Тільки для main гілки

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        if: github.ref == 'refs/heads/main'
        env:
          PROD_TOKEN: ${{ secrets.PRODUCTION_DEPLOY_TOKEN }}
        run: |
          echo "Deploying to production..."
          # Тут була б реальна команда деплою
          # deploy.sh --token "$PROD_TOKEN"
          echo "Deployment would use: $([ -n "$PROD_TOKEN" ] && echo 'Token is set' || echo 'Token missing')"