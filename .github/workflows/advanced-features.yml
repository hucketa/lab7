# .github/workflows/advanced-features.yml
name: Advanced Features Demo

on:
  push:
    branches: [main]
  schedule:
    # Запуск щодня о 2:00 UTC (cron синтаксис)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  # Job 1: Кешування та оптимізація
  cache-demo:
    name: Caching Demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache custom data
        uses: actions/cache@v3
        id: cache
        with:
          path: |
            ~/.cache/my-app
            node_modules/.cache
          key: ${{ runner.os }}-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cache-

      - name: Install dependencies
        run: npm ci

      - name: Build with cache
        run: |
          if [ "${{ steps.cache.outputs.cache-hit }}" == "true" ]; then
            echo "Cache hit! Using cached data"
          else
            echo "Cache miss! Building from scratch"
          fi
          npm run build

  # Job 2: Matrix з умовами
  matrix-conditional:
    name: Matrix with Conditions
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Продовжувати навіть якщо один job падає
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x]
        include:
          # Додаткові комбінації
          - os: ubuntu-latest
            node-version: 22.x
            experimental: true
        exclude:
          # Виключити комбінації
          - os: windows-latest
            node-version: 18.x

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        if: matrix.experimental != 'true'
        run: npm test

      - name: Run experimental tests
        if: matrix.experimental == 'true'
        run: npm run test:experimental || echo "Experimental tests not configured"

  # Job 3: Умовна логіка
  conditional-logic:
    name: Conditional Logic
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' # Пропустити для scheduled runs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        if: github.ref == 'refs/heads/main'

      - name: Step for main branch
        if: github.ref == 'refs/heads/main'
        run: echo "Running on main branch"

      - name: Step for pull requests
        if: github.event_name == 'pull_request'
        run: echo "Running for PR #${{ github.event.pull_request.number }}"

      - name: Step with input
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Deploying to: ${{ github.event.inputs.environment }}"
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            echo "⚠️ Production deployment requires approval"
          fi

  # Job 4: Scheduled tasks
  scheduled-tasks:
    name: Scheduled Maintenance
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run cleanup
        run: |
          echo "Running scheduled cleanup tasks"
          # Приклад: очищення старих логів, артефактів тощо
          echo "Cleanup completed"

      - name: Health check
        run: |
          echo "Performing health checks"
          # Перевірка стану сервісів
          curl -f https://api.example.com/health || echo "Health check failed"

  # Job 5: Нотифікації
  notifications:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [cache-demo, matrix-conditional]
    if: always() # Виконується завжди, навіть якщо попередні jobs пали

    steps:
      - name: Check workflow status
        id: status
        run: |
          if [ "${{ needs.cache-demo.result }}" == "success" ] && [ "${{ needs.matrix-conditional.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=All jobs completed successfully" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=Some jobs failed" >> $GITHUB_OUTPUT
          fi

      - name: Send success notification
        if: steps.status.outputs.status == 'success'
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "✅ Workflow succeeded: ${{ steps.status.outputs.message }}",
              attachments: [{
                color: 'good',
                text: "Repository: ${{ github.repository }}\nCommit: ${{ github.sha }}"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Send failure notification
        if: steps.status.outputs.status == 'failure'
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "❌ Workflow failed: ${{ steps.status.outputs.message }}",
              attachments: [{
                color: 'danger',
                text: "Repository: ${{ github.repository }}\nCommit: ${{ github.sha }}\nView: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  # Job 6: Reusable workflow (виклик іншого workflow)
  call-reusable:
    name: Call Reusable Workflow
    uses: ./.github/workflows/reusable-workflow.yml
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment || 'staging' }}